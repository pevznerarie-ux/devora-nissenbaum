<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>CRM — Devora Nissenbaum</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#F6F5F2; --surface:#FFFFFF; --surface-2:#FBFAF8;
  --ink:#1B1B19; --muted:#8C8C84; --faint:#B5B5AD;
  --line:#ECEAE4; --line-2:#E2DFD7;
  --accent:#B0884A; --accent-d:#92703A; --accent-soft:#F5EEE1;
  --green:#2E7D52; --green-soft:#E6F2EB;
  --amber:#B8860B; --amber-soft:#FBF1DA;
  --red:#B23A48; --red-soft:#F9E7E9;
  --blue:#2D6CB5; --blue-soft:#E7F0FA;
  --purple:#7A5CB0; --purple-soft:#EFEAF7;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --serif:'Fraunces',Georgia,serif;
  --sidebar-w:230px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--font);font-size:14px}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#d9d6cd;border-radius:10px}

/* ===== LOGIN ===== */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#16150F;padding:1rem;z-index:100}
.login-box{background:var(--surface);border-radius:18px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 24px 70px rgba(0,0,0,.5)}
.login-logo{font-family:var(--serif);font-size:1.5rem;text-align:center}
.login-logo b{color:var(--accent);font-weight:600}
.login-tag{text-align:center;font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:.4rem 0 2rem}
.login-box label{display:block;font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.login-box input{width:100%;padding:.8rem .9rem;border:1.5px solid var(--line-2);border-radius:var(--radius-sm);outline:none;transition:.15s}
.login-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.login-btn{width:100%;margin-top:1.4rem;padding:.85rem;background:var(--accent);color:#fff;border-radius:var(--radius-sm);font-weight:600;letter-spacing:.04em;transition:.15s}
.login-btn:hover{background:var(--accent-d)}
.login-err{display:none;margin-top:.9rem;padding:.7rem;background:var(--red-soft);color:var(--red);border-radius:var(--radius-sm);font-size:.82rem;text-align:center}
.login-hint{text-align:center;font-size:.72rem;color:var(--faint);margin-top:1.4rem}

/* ===== APP SHELL ===== */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}

/* Sidebar (desktop) */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:40;overflow-y:auto}
.side-logo{padding:1.3rem 1.3rem 1rem}
.side-logo .nm{font-family:var(--serif);font-size:1.15rem;line-height:1.1}
.side-logo .nm b{color:var(--accent);font-weight:600}
.side-logo .sub{font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-top:.25rem}
.side-nav{padding:.5rem .6rem;flex:1}
.side-group{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);padding:.9rem .7rem .4rem}
.nav-item{display:flex;align-items:center;gap:.7rem;padding:.6rem .7rem;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;color:#55554E;width:100%;text-align:left;transition:.12s;position:relative}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item.on{background:var(--accent-soft);color:var(--accent-d);font-weight:600}
.nav-ic{width:18px;height:18px;flex-shrink:0;opacity:.85}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:.62rem;font-weight:700;padding:.05rem .4rem;border-radius:20px;min-width:18px;text-align:center}
.side-foot{padding:.7rem .6rem;border-top:1px solid var(--line)}

/* Main */
.main{flex:1;margin-left:var(--sidebar-w);min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:rgba(246,245,242,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:.7rem 1.5rem;display:flex;align-items:center;gap:1rem}
.search{position:relative;flex:1;max-width:420px}
.search input{width:100%;padding:.55rem .9rem .55rem 2.2rem;border:1.5px solid var(--line-2);border-radius:30px;background:var(--surface);outline:none;transition:.15s}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);opacity:.4}
.top-actions{display:flex;gap:.5rem;margin-left:auto}
.content{padding:1.5rem;max-width:1240px;width:100%}

/* Mobile top + bottom nav */
.mtop{display:none}
.mobile-nav{display:none}
.mobile-more{display:none}

/* ===== COMPONENTS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.55rem 1rem;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;transition:.15s;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-d)}
.btn-ghost{background:var(--surface);border:1.5px solid var(--line-2);color:var(--ink)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent-d)}
.btn-soft{background:var(--surface-2);border:1px solid var(--line);color:#55554E}
.btn-soft:hover{background:var(--accent-soft);color:var(--accent-d)}
.btn-green{background:#25D366;color:#fff}
.btn-green:hover{background:#1da851}
.btn-danger{background:var(--red-soft);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:.35rem .7rem;font-size:.75rem}
.btn-block{width:100%}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;margin-bottom:1.4rem;flex-wrap:wrap}
.page-title{font-family:var(--serif);font-size:1.7rem;font-weight:500;letter-spacing:-.01em}
.page-sub{font-size:.82rem;color:var(--muted);margin-top:.15rem}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-h{padding:1rem 1.2rem;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:.75rem}
.card-t{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.card-b{padding:1.2rem}

.chip{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:30px;font-size:.7rem;font-weight:600;white-space:nowrap}
.chip-gold{background:var(--accent-soft);color:var(--accent-d)}
.chip-green{background:var(--green-soft);color:var(--green)}
.chip-amber{background:var(--amber-soft);color:var(--amber)}
.chip-red{background:var(--red-soft);color:var(--red)}
.chip-blue{background:var(--blue-soft);color:var(--blue)}
.chip-purple{background:var(--purple-soft);color:var(--purple)}
.chip-gray{background:#F0EFEA;color:#77756c}

.tag-pill{display:inline-flex;align-items:center;gap:.25rem;padding:.18rem .55rem;border-radius:30px;font-size:.68rem;font-weight:600}

/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.2rem}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:1.1rem 1.2rem;box-shadow:var(--shadow)}
.stat-lbl{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.4rem}
.stat-val{font-family:var(--serif);font-size:1.9rem;font-weight:500;margin-top:.4rem;line-height:1}
.stat-sub{font-size:.72rem;color:var(--faint);margin-top:.35rem}
.stat-sub.up{color:var(--green)}
.stat-sub.down{color:var(--red)}

/* Grids */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem}
.grid-2-1{display:grid;grid-template-columns:1.6fr 1fr;gap:1.2rem}

/* Table */
.tbl-wrap{overflow-x:auto}
table.tbl{width:100%;border-collapse:collapse;font-size:.84rem}
.tbl th{text-align:left;padding:.7rem 1rem;font-size:.64rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:.8rem 1rem;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:.1s}
.tbl tbody tr.clk{cursor:pointer}
.tbl tbody tr.clk:hover{background:var(--surface-2)}
.cell-strong{font-weight:600}
.cell-sub{font-size:.74rem;color:var(--muted)}

/* Bars chart */
.bars{display:flex;align-items:flex-end;gap:.5rem;height:150px;padding-top:.5rem}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:.4rem;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:34px;background:linear-gradient(to top,var(--accent),var(--accent-soft));border-radius:5px 5px 0 0;min-height:3px;transition:.3s;position:relative}
.bar:hover{background:linear-gradient(to top,var(--accent-d),var(--accent))}
.bar-lbl{font-size:.64rem;color:var(--muted);font-weight:600}
.bar-val{font-size:.6rem;color:var(--faint)}

/* Filters */
.filters{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.filt{padding:.4rem .8rem;border-radius:30px;font-size:.74rem;font-weight:600;border:1.5px solid var(--line-2);color:var(--muted);transition:.12s;background:var(--surface)}
.filt:hover{border-color:var(--accent)}
.filt.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-d)}

/* List rows */
.lrow{display:flex;align-items:center;gap:.8rem;padding:.8rem 0;border-bottom:1px solid var(--line)}
.lrow:last-child{border-bottom:none}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--accent-soft);color:var(--accent-d);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.lrow-main{flex:1;min-width:0}
.lrow-name{font-weight:600;font-size:.86rem}
.lrow-sub{font-size:.74rem;color:var(--muted)}

/* Empty */
.empty{text-align:center;padding:2.5rem 1rem;color:var(--faint)}
.empty-ic{font-size:2rem;opacity:.5;margin-bottom:.5rem}

/* Detail */
.back{display:inline-flex;align-items:center;gap:.35rem;font-size:.8rem;color:var(--muted);margin-bottom:1rem;transition:.12s}
.back:hover{color:var(--accent-d)}
.drow{display:flex;justify-content:space-between;gap:1rem;padding:.55rem 0;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:none}
.drow .k{font-size:.78rem;color:var(--muted);flex-shrink:0}
.drow .v{font-size:.84rem;font-weight:500;text-align:right;word-break:break-word}
.detail-actions{display:flex;flex-wrap:wrap;gap:.5rem;margin:1.2rem 0}

/* Alert banner */
.alert{display:flex;align-items:center;gap:.7rem;padding:.85rem 1.1rem;border-radius:var(--radius);font-size:.84rem;margin-bottom:1rem}
.alert b{cursor:pointer;text-decoration:underline}
.alert-amber{background:var(--amber-soft);color:#8a6608}
.alert-blue{background:var(--blue-soft);color:var(--blue)}
.alert-info{background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.kcol{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:.8rem;min-height:120px}
.kcol-h{font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.7rem;display:flex;align-items:center;justify-content:space-between}
.kcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:.7rem;margin-bottom:.6rem;box-shadow:0 1px 2px rgba(0,0,0,.03);cursor:pointer;transition:.12s}
.kcard:hover{border-color:var(--accent);transform:translateY(-1px)}
.kcard-name{font-weight:600;font-size:.8rem}
.kcard-sub{font-size:.72rem;color:var(--muted);margin-top:.15rem}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(20,18,12,.5);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(2px)}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 70px rgba(0,0,0,.4)}
.modal-h{padding:1.2rem 1.4rem;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2}
.modal-t{font-family:var(--serif);font-size:1.3rem;font-weight:500}
.modal-x{font-size:1.4rem;color:var(--muted);line-height:1;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.12s}
.modal-x:hover{background:var(--surface-2);color:var(--ink)}
.modal-b{padding:1.4rem}
.modal-f{padding:1rem 1.4rem;border-top:1px solid var(--line);display:flex;gap:.6rem;justify-content:flex-end;position:sticky;bottom:0;background:var(--surface)}

/* Form */
.fg{margin-bottom:1rem}
.fg label{display:block;font-size:.68rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem}
.fg input,.fg select,.fg textarea{width:100%;padding:.65rem .8rem;border:1.5px solid var(--line-2);border-radius:var(--radius-sm);outline:none;transition:.15s;background:var(--surface);color:var(--ink)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.fg textarea{resize:vertical;min-height:70px}
.fg-2{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.fg-hint{font-size:.74rem;color:var(--muted);background:var(--surface-2);padding:.6rem .8rem;border-radius:var(--radius-sm);margin-bottom:1rem}
.tag-select{display:flex;flex-wrap:wrap;gap:.4rem}
.tag-opt{padding:.35rem .7rem;border-radius:30px;font-size:.72rem;font-weight:600;border:1.5px solid var(--line-2);color:var(--muted);cursor:pointer;transition:.12s}
.tag-opt.on{border-color:transparent}

/* Toast */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translate(-50%,1rem);background:var(--ink);color:#fff;padding:.8rem 1.3rem;border-radius:30px;font-size:.84rem;font-weight:500;z-index:500;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

.icon-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--line-2);display:inline-flex;align-items:center;justify-content:center;transition:.12s;color:#55554E}
.icon-btn:hover{border-color:var(--accent);color:var(--accent-d);background:var(--accent-soft)}

.view{display:none}
.view.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.section-sep{font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:1.4rem 0 .7rem}

/* progress */
.prog{height:7px;background:var(--line);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:10px;transition:.4s}

/* ===== RESPONSIVE ===== */
@media(max-width:920px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3,.grid-2-1{grid-template-columns:1fr}
  .kanban{grid-template-columns:1fr 1fr}
}
@media(max-width:760px){
  .sidebar{display:none}
  .main{margin-left:0}
  .topbar{display:none}
  .mtop{display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;background:rgba(246,245,242,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:.8rem 1rem}
  .mtop .nm{font-family:var(--serif);font-size:1.1rem}
  .mtop .nm b{color:var(--accent)}
  .content{padding:1rem 1rem 5.5rem}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--line);padding:.4rem .3rem calc(.4rem + env(safe-area-inset-bottom));justify-content:space-around;box-shadow:0 -2px 12px rgba(0,0,0,.05)}
  .mnav{display:flex;flex-direction:column;align-items:center;gap:.15rem;padding:.35rem .6rem;border-radius:var(--radius-sm);font-size:.6rem;font-weight:600;color:var(--muted);flex:1;position:relative}
  .mnav svg{width:21px;height:21px}
  .mnav.on{color:var(--accent-d)}
  .mnav .nav-badge{position:absolute;top:.1rem;right:50%;margin-right:-18px}
  .mobile-more.show{display:block;position:fixed;inset:0;z-index:60;background:rgba(20,18,12,.4)}
  .mm-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:18px 18px 0 0;padding:1.2rem 1rem calc(1.2rem + env(safe-area-inset-bottom));box-shadow:0 -8px 40px rgba(0,0,0,.2)}
  .mm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-top:1rem}
  .mm-item{display:flex;flex-direction:column;align-items:center;gap:.4rem;padding:1rem .5rem;border-radius:var(--radius);background:var(--surface-2);font-size:.74rem;font-weight:600;color:#55554E}
  .mm-item svg{width:22px;height:22px;opacity:.8}
  .page-title{font-size:1.4rem}
  .stat-val{font-size:1.6rem}
  .modal{max-width:100%;border-radius:16px 16px 0 0;align-self:flex-end;max-height:94vh}
  .modal-bg{align-items:flex-end;padding:0}
  .fg-2{grid-template-columns:1fr}
  .detail-actions .btn{flex:1}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">Devora <b>Nissenbaum</b></div>
    <div class="login-tag">Espace Administration</div>
    <form id="login-form" autocomplete="off">
      <label>Mot de passe</label>
      <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password" />
      <div class="login-err" id="login-err">Mot de passe incorrect.</div>
      <button class="login-btn" type="submit">Entrer dans le CRM</button>
    </form>
    <div class="login-hint">Mot de passe par défaut : <b>admin2026</b></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="side-logo">
      <div class="nm">Devora <b>Nissenbaum</b></div>
      <div class="sub">CRM · Espace Pro</div>
    </div>
    <nav class="side-nav" id="side-nav"></nav>
    <div class="side-foot">
      <a href="index.html" class="nav-item"><span class="nav-ic">🌐</span> Voir le site</a>
      <button class="nav-item" onclick="logout()"><span class="nav-ic">↩︎</span> Déconnexion</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- Desktop topbar -->
    <div class="topbar">
      <div class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search" placeholder="Rechercher un client, une commande…" />
      </div>
      <div class="top-actions">
        <button class="btn btn-ghost" onclick="openClientModal()">+ Client</button>
        <button class="btn btn-primary" onclick="openCommandeModal()">+ Commande</button>
      </div>
    </div>

    <!-- Mobile top -->
    <div class="mtop">
      <div class="nm">Devora <b>N.</b></div>
      <div style="display:flex;gap:.5rem">
        <button class="icon-btn" onclick="openCommandeModal()">＋</button>
        <button class="icon-btn" onclick="document.getElementById('msearch').scrollIntoView();document.getElementById('msearch').focus()">🔍</button>
      </div>
    </div>

    <div class="content">
      <!-- mobile search -->
      <div class="search" style="max-width:100%;margin-bottom:1rem;display:none" id="msearch-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="msearch" placeholder="Rechercher…" />
